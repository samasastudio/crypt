name: Index Vault

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.json"
      - "**/*.canvas"
      - ".github/workflows/index-vault.yml"
      - "tools/vault-indexer/**"
      - "supabase/migrations/**"
  workflow_dispatch:
    inputs:
      full_reindex:
        description: "Run a full vault rebuild"
        required: false
        default: false
        type: boolean

concurrency:
  group: vault-index-${{ github.ref }}
  cancel-in-progress: false

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/vault-indexer/package-lock.json

      - name: Install dependencies
        working-directory: tools/vault-indexer
        run: npm ci

      - name: Collect changed files
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            git ls-files > /tmp/changed-files.txt
            : > /tmp/deleted-files.txt
          else
            git diff --name-only --diff-filter=AMR "$BEFORE_SHA" "${{ github.sha }}" > /tmp/changed-files.txt
            git diff --name-only --diff-filter=D "$BEFORE_SHA" "${{ github.sha }}" > /tmp/deleted-files.txt
          fi

      - name: Full reindex
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_reindex }}
        working-directory: tools/vault-indexer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}
        run: npm run index:vault -- --full

      - name: Incremental index
        if: ${{ github.event_name == 'push' }}
        working-directory: tools/vault-indexer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          npm run index:vault -- \
            --changed-file-list /tmp/changed-files.txt \
            --deleted-file-list /tmp/deleted-files.txt
